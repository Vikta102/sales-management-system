{% extends "base.html" %}
{% block title %}Login - SalesMS{% endblock %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h1 class="h4 mb-3">Login</h1>
          <form method="post" action="{{ url_for('auth.login_post') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
              <label class="form-label">Username or Email</label>
              <input class="form-control" name="identifier" placeholder="e.g. alice or alice@example.com" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input class="form-control" type="password" name="password" required>
            </div>
            <button class="btn btn-primary w-100" type="submit">Login</button>
          </form>
          <div class="text-muted mt-3">
            No account? <a href="{{ url_for('auth.register') }}">Register</a>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
