{% extends "base.html" %}
{% block title %}Register - SalesMS{% endblock %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h1 class="h4 mb-3">Register</h1>
          <form method="post" action="{{ url_for('auth.register_post') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input class="form-control" name="username" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input class="form-control" type="email" name="email" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input class="form-control" type="password" name="password" minlength="8" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Confirm Password</label>
              <input class="form-control" type="password" name="password2" minlength="8" required>
            </div>
            <button class="btn btn-primary w-100" type="submit">Create Account</button>
          </form>
          <div class="text-muted mt-3">
            Already have an account? <a href="{{ url_for('auth.login') }}">Login</a>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
