{% extends "base.html" %}
{% set is_edit = product is not none %}
{% block title %}{{ "Edit" if is_edit else "New" }} Product - SalesMS{% endblock %}
{% block content %}
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h1 class="h3 mb-0">{{ "Edit" if is_edit else "New" }} Product</h1>
    <a class="btn btn-outline-secondary" href="{{ url_for('products.list_products') }}">Back</a>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <form method="post" action="{{ url_for('products.update_product', product_id=product.id) if is_edit else url_for('products.create_product') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Name</label>
            <input class="form-control" name="name" value="{{ product.name if is_edit else '' }}" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">SKU (optional)</label>
            <input class="form-control" name="sku" value="{{ product.sku if is_edit else '' }}">
          </div>
          <div class="col-md-6">
            <label class="form-label">Price</label>
            <input class="form-control" name="price" type="number" step="0.01" min="0" value="{{ product.price if is_edit else '0.00' }}" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Stock</label>
            <input class="form-control" name="stock" type="number" step="1" min="0" value="{{ product.stock if is_edit else 0 }}" required>
          </div>
        </div>
        <div class="mt-3">
          <button class="btn btn-primary" type="submit">{{ "Save Changes" if is_edit else "Create Product" }}</button>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
